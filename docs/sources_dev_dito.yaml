# local sources — Dev Dito Pipeline
# Complete reference of all scripts, configs, outputs across the techstack
#
# ==========================================================================
# PIPELINE OVERVIEW — Optimaler Flow durch die Dev Dito Pipeline
# ==========================================================================
#
# Die gesamte Pipeline transformiert DokuWiki-Inhalte in durchsuchbare
# Embeddings und evaluiert deren Qualitaet in mehreren Stufen.

#
# ┌────────────────────────────────────────────────────────────────────┐
# │                     STAGE 1: CONTENT ACQUISITION                   │
# │                     Section 1 — Wiki Fetcher                       │
# ├────────────────────────────────────────────────────────────────────┤
# │  DokuWiki (HTL Leonding)                                           │
# │       │                                                            │
# │       ▼  JSON-RPC API (fetch_full_wiki_extended.py)                │
# │  Raw Content: 207 Pages + 661 Media Files                          │
# │  Output: raw_json/, page_content/, page_html/, media/              │
# │                                                                    │
# │  Konfiguration: env.yaml, settings.json, ssl.cert, api.token       │
# └────────────────────────┬───────────────────────────────────────────┘
#                          │
#                          ▼
# ┌────────────────────────────────────────────────────────────────────┐
# │                     STAGE 2: CONTENT ANALYSIS                      │
# │                     Section 2 — Fetched Data Evaluation            │
# ├────────────────────────────────────────────────────────────────────┤
# │  Deep Analysis der gefetchten Rohdaten                             │
# │       │                                                            │
# │       ├─ Content Classification (NEWS, REFERENCE, TUTORIAL, ...)   │
# │       ├─ Format Quality Analysis                                   │
# │       ├─ RAG Readiness Check                                       │
# │       ├─ Temporal Analysis                                         │
# │       └─ Query Generation (fuer spaetere Ground Truth)             │
# │                                                                    │
# │  Output: ANALYSIS_REPORT.md/.pdf, preprocessing_strategies.yaml    │
# │  Die Strategies steuern die naechste Stufe (Preprocessing)         │
# └────────────────────────┬───────────────────────────────────────────┘
#                          │
#                          ▼
# ┌────────────────────────────────────────────────────────────────────┐
# │                     STAGE 3: RAG PREPROCESSING                     │
# │                     Section 5 — RAGFlow Preprocessing              │
# ├────────────────────────────────────────────────────────────────────┤
# │  Transformation: Wiki-Syntax → RAG-optimiertes Markdown            │
# │       │                                                            │
# │       ├─ Page Processing  (Wiki → Markdown mit YAML Frontmatter)   │
# │       ├─ Media Processing (PDF/DOCX/XLSX/PPTX/Images → Plaintext)  │
# │       ├─ Metadata Enrichment (Kategorie, Sprache, Timestamps)      │
# │       └─ Strategy-basiertes Routing (aus Stage 2)                  │
# │                                                                    │
# │  Output: 348 Pages (.md) + 106 Media (.txt) = 454 Dokumente        │
# │  100% Link-Preservation, OCR-Fallback via Tesseract                │
# └────────────────────────┬───────────────────────────────────────────┘
#                          │
#                          ▼
# ┌────────────────────────────────────────────────────────────────────┐
# │                     STAGE 3b: PREPROCESSING EVALUATION             │
# │                     Section 6 — Preprocessing Evaluation           │
# ├────────────────────────────────────────────────────────────────────┤
# │  Qualitaetspruefung der Transformation (Stage 3 Output)            │
# │       │                                                            │
# │       ├─ Information Preservation (Completeness, Semantic Sim.)    │
# │       ├─ Content Quality (Noise Detection, Readability)            │
# │       ├─ Structure Preservation (Headings, Lists, Paragraphs)      │
# │       ├─ OCR Quality (CER, WER, Confidence, German Umlauts)        │
# │       └─ Entity Preservation (Dates, Names, Rooms)                 │
# │                                                                    │
# │  Bei ungenuegender Qualitaet: zurueck zu Stage 3 (Tuning)          │
# └────────────────────────┬───────────────────────────────────────────┘
#                          │  (Qualitaet OK)
#                          ▼
# ┌────────────────────────────────────────────────────────────────────┐
# │                     STAGE 4: EMBEDDING CREATION                    │
# │                     Section 4 — Qdrant Embeddings Creator          │
# ├────────────────────────────────────────────────────────────────────┤
# │  Content-Aware Chunking + Embedding-Generierung                    │
# │       │                                                            │
# │       ├─ Document Loading (preprocessed .md/.txt aus Stage 3)      │
# │       ├─ Content-Aware Chunking (semantic, recursive_header,       │
# │       │     parent_context, table_row, naive — je nach Content)    │
# │       └─ Embedding (OpenAI text-embedding-3-large, 3072 dims)      │
# │                                                                    │
# │  Output: embedded_chunks.jsonl (3417 Chunks, ~$0.095/Run)          │
# │  Fallback-Model: paraphrase-multilingual-mpnet-base-v2 (384 dims)  │
# └────────────────────────┬───────────────────────────────────────────┘
#                          │
#                          ▼
# ┌────────────────────────────────────────────────────────────────────┐
# │                     STAGE 5: VECTOR DB DEPLOYMENT                  │
# │                     Section 4 — Qdrant Collection Init             │
# ├────────────────────────────────────────────────────────────────────┤
# │  Upload der Embeddings in Qdrant (Docker Service)                  │
# │       │                                                            │
# │       └─ init_collection.py → wiki_embeddings Collection           │
# │                                                                    │
# │  Laeuft als qdrant_init Service in Docker Compose (Stack-G)        │
# │  Hash-basierte Change Detection fuer inkrementelle Updates         │
# └────────────────────────┬───────────────────────────────────────────┘
#                          │
#                          ▼
# ┌────────────────────────────────────────────────────────────────────┐
# │                     STAGE 6: END-TO-END EVALUATION                 │
# │                     Section 7 — RAGAS Evaluation                   │
# ├────────────────────────────────────────────────────────────────────┤
# │  Wissenschaftliche Bewertung des gesamten RAG-Systems              │
# │       │                                                            │
# │       ├─ Ground Truth: 50 verifizierte QA-Paare (LeoWiki)          │
# │       ├─ RAGAS Metrics (Faithfulness, Answer Relevancy,            │
# │       │     Context Precision/Recall, Answer Correctness)          │
# │       ├─ Retrieval Metrics (MRR, NDCG@K, Precision/Recall@K,       │
# │       │     MAP, F1@K, Hit Rate)                                   │
# │       ├─ Qdrant-spezifische Evaluation (Retriever + Evaluator)     │
# │       ├─ Statistical Analysis (Bootstrap CI, t-tests, Wilcoxon)    │
# │       └─ Reports (Markdown, LaTeX, JSON, Jupyter Notebooks)        │
# │                                                                    │
# │  Bei ungenuegender Qualitaet: zurueck zu Stage 2-4 (Optimierung)   │
# └────────────────────────────────────────────────────────────────────┘
#
# INFRASTRUKTUR (Section 8-9):
#   RAGFlow Test Suite — Docker-Management (start/stop/status/logs)
#   RAGFlow Research   — DB-Schema-Planung, Architektur-Entscheidungen
#
# FEEDBACK-LOOPS:
#   Stage 6 → Stage 2: Chunking-Strategien anpassen
#   Stage 6 → Stage 3: Preprocessing-Parameter tunen
#   Stage 6 → Stage 4: Embedding-Modell/Dimensionen aendern
#   Stage 3b → Stage 3: Preprocessing bei Qualitaetsproblemen wiederholen
#
# ==========================================================================

