# Qdrant Embeddings Creator Configuration
# =========================================
# Creates optimized embeddings for Qdrant based on Deep Evaluation strategies.
# All settings are configured here - NO hardcoded values in Python scripts!
# Variable placeholders ${var} are resolved at runtime.

APP:
  name: qdrant_embeddings_creator
  description: "Creates optimized embeddings for Qdrant based on Deep Evaluation strategies"
  version: 2.0.0
  status: development
  created_at: "2026-01-06T00:00:00"
  author:
    full_name: Jan Ritt
    institution: HTL Leonding
    github_profile:
      username: IxI-Enki
      url: https://github.com/IxI-Enki

# =============================================================================
# PATHS - All directories and file paths
# =============================================================================
# Output and logs under repo data/ (same pattern as other pipeline stages).
# JSONL written to output_dir/embedded_at_YYYYMMDD_HHMMSS/embedded_chunks.jsonl
PATHS:
  root_dir: D:/_Repositories/_Diploma_Thesis_Repositories/dev_dito/pipeline/04_embeddings_creator
  config_dir: ${root_dir}
  script_dir: ${root_dir}
  output_dir: ${root_dir}/../../data/embeddings
  log_dir: ${root_dir}/../../data/logs
  preprocessed_base: ${root_dir}/../../data/preprocessed
  input_dir: ${preprocessed_base}

# =============================================================================
# OPENAI API - Embedding Configuration
# =============================================================================
OPENAI:
  # === API Credentials ===
  # Set via environment variable for security
  api_key_env: OPENAI_API_KEY
  
  # API Endpoint
  base_url: https://api.openai.com/v1
  timeout: 60                         # seconds
  max_retries: 3
  retry_delay: 2                      # seconds between retries

  # === Embedding Model ===
  embedding:
    model: text-embedding-3-large
    # text-embedding-3-large: Best quality for multilingual content (German!)
    # Better semantic capture of technical terms and context
    
    dimensions: 3072
    # 3072 dimensions for maximum quality (text-embedding-3-large default)
    # Important for German technical vocabulary
    
    encoding_format: float            # float | base64

  # === Batching ===
  batch:
    size: 20         # Documents per API request (reduced to avoid token limits)
    max_tokens_per_batch: 250000      # Token limit per batch (OpenAI max: 300k)

  # === Rate Limiting ===
  rate_limit:
    requests_per_minute: 500          # OpenAI Tier 1: 500 RPM
    tokens_per_minute: 200000         # OpenAI Tier 1: 200k TPM
    delay_between_batches: 0.5        # seconds

# =============================================================================
# CHUNKING - Content-Aware Chunking (based on Deep Evaluation)
# =============================================================================
# J4 best value: 512 tokens; ~4 chars/token => max_chunk_size 2048
CHUNKING:
  default:
    method: semantic
    max_chunk_size: 2048              # chars (~512 tokens, J4 best value)
    chunk_overlap: 150
    min_chunk_size: 200

  # === Content-Type Specific Settings ===
  # Based on preprocessing_strategies.yaml from Deep Evaluation
  content_types:
    KNOWLEDGE:
      method: recursive_header
      max_chunk_size: 1024
      chunk_overlap: 150
      split_on_headers: true
      
    PORTAL:
      method: parent_context
      action: index_as_context_only
      # Portals are NOT directly chunked, only as context for linked docs
      
    FORM_COLLECTION:
      method: table_row
      action: extract_links_and_metadata
      max_chunk_size: 512
      
    NEWS:
      method: naive
      max_chunk_size: 1024
      chunk_overlap: 100
      freshness_weight: 0.5  # Weight older news lower
      
    TABLE_DATA:
      method: table_aware
      max_chunk_size: 2048
      chunk_overlap: 0
      preserve_table_structure: true
      
    EMPTY:
      action: skip
      
    # Document types (from media)
    DOCUMENT:
      method: standard
      max_chunk_size: 1024
      
    OFFICE_DOCUMENT:
      method: standard
      max_chunk_size: 1024
      
    FORM:
      method: metadata_only
      action: index_metadata_only
      
    CURRICULUM:
      method: table_aware_pdf
      max_chunk_size: 1024
      extract_tables: true
      
    THESIS:
      method: scientific_paper
      max_chunk_size: 2048
      chunk_overlap: 200
      extract_abstract: true
      
    MEDIA:
      method: standard
      max_chunk_size: 1024
      
    IMAGE:
      method: caption_only
      max_chunk_size: 512

# =============================================================================
# TEXT PREPARATION
# =============================================================================
TEXT_PREP:
  encoding: utf-8
  fallback_encodings:
    - latin-1
    - cp1252
    
  # Text cleaning
  strip_whitespace: true
  normalize_unicode: true
  remove_control_chars: true
  
  # Frontmatter handling - OPTIMIZED FOR RAG!
  extract_frontmatter: true
  include_frontmatter_in_text: true
  # Include these frontmatter fields in the chunk text for better semantic search
  frontmatter_fields_in_text:
    - title                     # Page/media title (VERY important for context!)
    - namespace                 # Namespace for topical assignment
    - content_type              # Content type for categorization

# =============================================================================
# OUTPUT FORMAT - JSONL Structure
# =============================================================================
OUTPUT:
  format: jsonl
  encoding: utf-8
  pretty_print: false           # false = compact, true = formatted (larger)
  
  # Combined output (one JSONL for pages + media)
  combined: true
  filename: embedded_chunks.jsonl
  
  # JSONL Schema
  schema:
    id_field: id
    text_field: text
    embedding_field: embedding
    metadata_field: metadata
    
    # ID format: {collection}_{file_stem}_{chunk_index}
    id_format: "{collection}_{file}_{chunk}"

  # Metadata fields to include in output
  include_metadata:
    source: true                # Wiki URL
    collection: true            # pages | media
    title: true
    namespace: true
    page_id: true
    media_id: true
    access_level: true          # public | teacher_only
    content_type: true          # KNOWLEDGE, PORTAL, etc.
    freshness_score: true
    freshness_category: true
    chunk_index: true
    total_chunks: true
    original_length: true
    embedding_model: true
    embedding_dimensions: true
    created_at: true
    # Relationship data
    links_to: true
    linked_from: true
    media_refs: true
    referenced_by: true

# =============================================================================
# STATISTICS - Statistics and Reporting
# =============================================================================
STATISTICS:
  enabled: true
  # output_file set at runtime to run_output_dir/embedding_statistics.json
  print_summary: true
  
  # Track metrics
  track:
    - document_count
    - chunk_count
    - total_tokens
    - total_cost
    - avg_chunk_size
    - processing_time
    
  # Cost estimation (OpenAI Pricing, Jan 2026)
  cost:
    text-embedding-3-small: 0.00002  # $ per 1k tokens
    text-embedding-3-large: 0.00013  # $ per 1k tokens
    text-embedding-ada-002: 0.00010  # $ per 1k tokens

# =============================================================================
# LOGGING
# =============================================================================
LOGGING:
  level: INFO  # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: ${log_dir}/embedding_process.log
  console: true
  
  # Log levels per module
  levels:
    openai: WARNING
    urllib3: WARNING
    
  # Progress bar
  progress:
    enabled: true
    unit: docs
    colour: green

# =============================================================================
# PROCESSING
# =============================================================================
PROCESSING:
  # Performance settings
  parallel_processing: false  # Not yet implemented
  batch_processing: true
  
  # Error handling
  continue_on_error: true
  max_errors: 100
  skip_empty_documents: true
  
  # Cache
  cache_embeddings: false  # Enable to skip already embedded docs
  cache_file: ${output_dir}/embedding_cache.json

# =============================================================================
# VALIDATION
# =============================================================================
VALIDATION:
  validate_inputs: true
  check_file_exists: true
  check_min_file_size: 10  # bytes
  
  validate_outputs: true
  check_embedding_dimensions: true
  check_all_fields_present: true
  
  required_fields:
    - id
    - text
    - embedding
    - metadata
