# Fetched Data Evaluation Pipeline Configuration
# ===============================================
# Evaluiert gefetchte DokuWiki-Daten für optimales RAG-Preprocessing
# ALLE Einstellungen sind hier konfiguriert - NICHTS ist hardcoded!
# Variable placeholders ${var} werden zur Laufzeit aufgelöst

APP:
  name: fetched_data_evaluation
  description: Analysiert DokuWiki-Daten für optimale RAG-Aufbereitung
  version: 1.0.0
  status: development
  created_at: "2026-01-03T00:00:00"
  author:
    full_name: Jan Ritt
    institution: HTL Leonding
    github_profile:
      username: IxI-Enki
      url: https://github.com/IxI-Enki

# =============================================================================
# PATHS - Alle Verzeichnisse und Dateipfade
# =============================================================================
PATHS:
  # Base directories
  root_dir: D:/_Repositories/_Diploma_Thesis_Repositories/research/techstack/dokuwiki/fetched_data_evaluation
  config_dir: ${root_dir}/config
  script_dir: ${root_dir}/script
  results_dir: ${root_dir}/results

  # Source data from DokuWiki Fetcher
  fetched_data_base: D:/_Repositories/_Diploma_Thesis_Repositories/research/techstack/dokuwiki/fetcher_json_rpc_api/content_output
  fetched_data_dir: ${fetched_data_base}/fetched_at_20251231_180730

  # Fetched data subfolders
  page_content_dir: ${fetched_data_dir}/page_content
  page_metadata_dir: ${fetched_data_dir}/page_metadata
  page_html_dir: ${fetched_data_dir}/page_html
  page_links_dir: ${fetched_data_dir}/page_links
  page_backlinks_dir: ${fetched_data_dir}/page_backlinks
  page_history_dir: ${fetched_data_dir}/page_history
  media_dir: ${fetched_data_dir}/media
  namespaces_dir: ${fetched_data_dir}/namespaces
  changes_dir: ${fetched_data_dir}/changes
  raw_json_dir: ${fetched_data_dir}/raw_json

  # Special files
  wiki_analysis_report: ${fetched_data_dir}/wiki_analysis_report.txt
  media_usage_index: ${fetched_data_dir}/media_usage_index.json

  # Related projects (für Cross-Referenz)
  preprocessor_config: D:/_Repositories/_Diploma_Thesis_Repositories/research/techstack/ragflow/test_suite_rag_preprocessing/config/env.yaml
  ragas_ground_truth_dir: D:/_Repositories/_Diploma_Thesis_Repositories/research/techstack/ragas/ground_truth

  # Tesseract OCR (Windows)
  tesseract_cmd: "C:/Program Files/Tesseract-OCR/tesseract.exe"

# =============================================================================
# CONTENT CLASSIFICATION - Kategorisierung der Inhalte
# =============================================================================
CONTENT_CLASSIFICATION:
  # Namespace-Kategorien (aus Wiki-Analyse)
  namespaces:
    teacher_restricted:      # Nur für Lehrer zugänglich
      - teacher
    public:                  # Für alle zugänglich
      - org
      - departm
      - exams
      - it
      - competitions
      - archive
      - department
      - werkstaette
      - class
      - wiki
      - playground
      - software
      - tutorial
      - wocheninfo
      - special
      - root

  # Inhaltstypen nach Funktion
  content_types:
    organizational:          # Schulorganisation
      - org
      - wocheninfo
    educational:             # Lehrplan, Abteilungen
      - departm
      - department
    examination:             # Prüfungen, Diplomarbeiten
      - exams
    technical:               # IT, Software
      - it
      - software
    competition:             # Wettbewerbe
      - competitions
    practical:               # Werkstätten
      - werkstaette
    archived:                # Archivierte Inhalte
      - archive

# =============================================================================
# TEMPORAL ANALYSIS - Zeitliche Aspekte und Aktualität
# =============================================================================
TEMPORAL_ANALYSIS:
  enabled: true

  # Archiv-Behandlung
  archive:
    namespace: archive
    handling: separate         # separate | exclude | include_with_tag
    # Archivierte Inhalte werden separat analysiert und markiert
    add_metadata_tag: true     # Fügt "archived: true" zu Metadaten hinzu

  # Aktualitäts-Erkennung
  freshness:
    # Zeiträume für Aktualitäts-Klassifizierung
    current_days: 90           # Aktuell: letzte 90 Tage
    recent_days: 365           # Kürzlich: letztes Jahr
    outdated_days: 730         # Veraltet: älter als 2 Jahre

    # Indikatoren für zeitkritische Inhalte
    time_sensitive_patterns:
      - "termine"              # Termine-Seiten
      - "aktuell"              # Aktuelle Infos
      - "202[0-9]"             # Jahreszahlen
      - "wocheninfo"           # Wöchentliche Infos
      - "news"

  # Jahres-Referenzen erkennen
  year_detection:
    current_year: 2026         # Wird dynamisch aktualisiert
    patterns:
      - "\\b20[0-9]{2}\\b"     # Jahre 2000-2099
      - "WS ?20[0-9]{2}"       # Wintersemester
      - "SS ?20[0-9]{2}"       # Sommersemester
      - "[0-9]{2}/[0-9]{2}"    # Schuljahr-Format (24/25)

  # Revisions-Analyse
  revision_history:
    analyze: true
    max_revisions: 10          # Nur letzte 10 Revisionen analysieren
    detect_major_changes: true # Größere Änderungen erkennen

  # Empfehlungen für RAG
  rag_recommendations:
    # Wie mit zeitlich unterschiedlichem Content umgehen
    current_weight: 1.0        # Gewichtung aktueller Inhalte
    recent_weight: 0.9         # Gewichtung kürzlicher Inhalte
    archived_weight: 0.5       # Gewichtung archivierter Inhalte
    outdated_weight: 0.3       # Gewichtung veralteter Inhalte

    # Metadaten-Anreicherung
    add_freshness_tag: true    # Fügt freshness-Score zu Chunks hinzu
    add_last_modified: true    # Fügt last_modified zu Chunks hinzu

  # Seitentypen-Erkennung (Regex-Pattern)
  page_type_patterns:
    form:                    # Formulare
      patterns:
        - ".*form.*"
        - ".*formular.*"
        - ".*antrag.*"
    procedure:               # Abläufe/Prozesse
      patterns:
        - ".*ablauf.*"
        - ".*prozess.*"
        - ".*anleitung.*"
    reference:               # Nachschlagewerke
      patterns:
        - ".*liste.*"
        - ".*übersicht.*"
        - ".*index.*"
    news:                    # Neuigkeiten
      patterns:
        - ".*termin.*"
        - ".*aktuell.*"
        - ".*news.*"

# =============================================================================
# FORMAT & QUALITY ANALYSIS - Qualitätsanalyse der Dateiformate
# =============================================================================
FORMAT_ANALYSIS:
  # Text-Encodings für Datei-Lesung (Fallback-Reihenfolge)
  text_encodings:
    - utf-8
    - latin-1
    - cp1252
  
  # Extraction Limits (für Performance während Evaluation)
  extraction_limits:
    pdf_max_pages: 5        # Max Seiten pro PDF für Text-Extraktion
    xlsx_max_rows: 50       # Max Zeilen pro Sheet für Text-Extraktion
  
  # Unterstützte Dateiformate
  supported_formats:
    pages:
      extensions: [".txt", ".md"]
      analyze_wiki_syntax: true

    documents:
      pdf:
        extensions: [".pdf"]
        check_text_layer: true
        check_ocr_quality: true
        min_text_ratio: 0.1      # Mindestens 10% Text pro Seite

      office:
        docx:
          extensions: [".docx"]
          extract_headers: true
        xlsx:
          extensions: [".xlsx"]
          check_structure: true
        pptx:
          extensions: [".pptx"]
          extract_slides: true
        odt:
          extensions: [".odt"]

    images:
      extensions: [".jpg", ".jpeg", ".png", ".svg"]
      min_resolution: 100        # Mindestauflösung in Pixel
      min_size_kb: 5             # Mindestgröße in KB
      ocr_candidates:            # Bilder die für OCR geeignet sind
        min_width: 200
        min_height: 100

    archives:
      extensions: [".zip"]
      analyze_contents: false    # Nicht entpacken

  # Qualitätsmetriken
  quality_thresholds:
    page_content:
      min_chars: 50              # Mindestens 50 Zeichen
      max_chars: 100000          # Maximal 100k Zeichen
      min_words: 10              # Mindestens 10 Wörter

    pdf:
      min_text_chars: 100        # Mindestens 100 Zeichen Text
      max_file_size_mb: 50       # Maximal 50 MB

    image:
      min_resolution: 100        # Mindest-Pixelbreite/-höhe
      max_file_size_mb: 20       # Maximal 20 MB

# =============================================================================
# RAG READINESS - Eignung für RAG-Pipeline
# =============================================================================
RAG_READINESS:
  # Chunking-Eignung
  chunking:
    # Ideale Längen für verschiedene Chunk-Strategien
    ideal_paragraph_length:
      min: 100
      max: 500
    ideal_section_length:
      min: 200
      max: 1500

    # Strukturelemente die Chunking unterstützen
    positive_indicators:
      - headlines              # Überschriften (DokuWiki ====)
      - paragraphs             # Klar getrennte Absätze
      - lists                  # Aufzählungen
      - sections               # Abschnitte

    # Problematische Elemente
    negative_indicators:
      - multicolumn            # Mehrspaltige Layouts
      - heavy_tables           # Große Tabellen
      - inline_code_blocks     # Code-Blöcke ohne Kontext
      - orphan_images          # Bilder ohne Text-Kontext

  # Noise-Level Bewertung
  noise_detection:
    # Wiki-Syntax die entfernt werden sollte
    removable_syntax:
      - "{{>toc}}"            # TOC-Marker
      - "~~NOTOC~~"           # NOTOC-Marker
      - "~~NOCACHE~~"         # Cache-Marker
      - "<wrap.*>.*</wrap>"   # Wrap-Tags

    # Boilerplate-Muster
    boilerplate_patterns:
      - "^={6}.*={6}$"        # Leere Überschriften
      - "^\\s*$"              # Leerzeilen (Häufung)
      - "^----$"              # Horizontale Linien

  # Metadaten-Qualität
  metadata_requirements:
    required:
      - title                  # Seitentitel
      - namespace              # Namespace
      - last_modified          # Letzte Änderung
    optional:
      - author                 # Autor
      - revision               # Revision
      - acl                    # Zugriffsrechte

  # Link-Qualität
  link_quality:
    check_internal_links: true
    check_external_links: false  # Externe Links nicht prüfen
    check_media_refs: true
    broken_link_threshold: 0.1   # Max 10% kaputte Links

# =============================================================================
# DIPLOMA THESIS HANDLING - Separate Behandlung der Diplomarbeiten
# =============================================================================
DIPLOMA_THESIS:
  enabled: true
  separate_analysis: true

  # Die 7 großen Diplomarbeits-PDFs (aus preprocessor config)
  files:
    - "200403_main_final.pdf"
    - "crowdfit-diploma_thesis.pdf"
    - "customer_setup_performance_check.pdf"
    - "james.pdf"
    - "kemon_keba_network_monitor.pdf"
    - "marco.pdf"
    - "threed_object_reconstruction.pdf"

  # Spezielle Analyse für Thesis-PDFs
  analysis:
    extract_abstract: true
    extract_toc: true
    count_pages: true
    estimate_complexity: true

  # Empfehlungen für separate Indexierung
  recommendations:
    separate_dataset: true       # In separates RAGFlow-Dataset
    chunk_method: paper          # Paper-spezifisches Chunking
    chunk_size: 1024             # Größere Chunks für Thesis

# =============================================================================
# LLM CONFIGURATION - LM Studio API Settings
# =============================================================================
LLM:
  # === LM-Studio Configuration ===
  provider: LM-Studio
  base_url: http://192.168.8.3:1234/v1
  timeout: 120
  api_key: "lm-studio"  # Not needed for LM Studio, but required by API
  
  # LM Studio CLI command (for check_models.py)
  lm_studio_cli: "lms"  # or full path if not in PATH
  
  # Models for different tasks
  classification_model: "qwen/qwen2.5-vl-7b"   # Loaded Vision-Language Model
  vision_model: "qwen/qwen2.5-vl-7b"           # Same model for images
  
  # Generation parameters (MUSS vorhanden sein!)
  generation:
    max_tokens: 512
    temperature: 0.1
    top_p: 0.9
  
  # Image optimization settings
  image_optimization:
    max_size: 1024        # Maximale Bildgröße in Pixel (vor Resize)
    jpeg_quality: 85     # JPEG-Qualität (0-100)
  
  # System prompt (default für alle Anfragen)
  system_prompt: "Du bist ein hilfreicher Assistent."

# =============================================================================
# QUERY GENERATION - Synthetische Test-Queries
# =============================================================================
QUERY_GENERATION:
  enabled: true

  # Query-Typen
  query_types:
    factual:                     # Faktenfragen
      count_per_chunk: 1
      prompt_template: |
        Basierend auf folgendem Text, erstelle eine präzise Faktenfrage:

        TEXT:
        {chunk}

        Erstelle eine Frage, die mit den Informationen im Text beantwortet werden kann.
        Die Frage soll auf Deutsch sein.
        Antworte NUR mit der Frage, ohne weitere Erklärung.

    procedural:                  # Ablauf-/How-to-Fragen
      count_per_chunk: 1
      applies_to:
        - procedure
        - form
      prompt_template: |
        Basierend auf folgendem Text, erstelle eine Wie-macht-man-Frage:

        TEXT:
        {chunk}

        Erstelle eine Frage im Stil "Wie...", "Was muss ich tun um...", etc.
        Die Frage soll auf Deutsch sein.
        Antworte NUR mit der Frage, ohne weitere Erklärung.

  # Sampling-Strategie
  sampling:
    pages_per_namespace: 3       # Max Seiten pro Namespace
    chunks_per_page: 2           # Max Chunks pro Seite
    min_chunk_length: 200        # Mindestlänge für Query-Generierung

  # Output
  output:
    format: json                 # JSON für RAGAS-Kompatibilität
    include_source: true         # Quelle (page/chunk) inkludieren
    include_context: true        # Kontext-Chunk inkludieren

# =============================================================================
# REPORT GENERATION - Ausgabe der Evaluierung
# =============================================================================
REPORTS:
  author: Jan Ritt
  institution: HTL Leonding

  # Ausgabeformate
  formats:
    markdown: true
    json: true
    html: false                  # Optional: HTML-Report

  # Report-Sektionen
  sections:
    executive_summary: true      # Zusammenfassung
    content_overview: true       # Inhaltsübersicht
    quality_analysis: true       # Qualitätsanalyse
    rag_recommendations: true    # RAG-Empfehlungen
    preprocessing_plan: true     # Preprocessing-Plan
    query_samples: true          # Generierte Beispiel-Queries
    diploma_thesis: true         # Diplomarbeits-Analyse

  # Visualisierungen
  visualizations:
    enabled: true
    format: png
    dpi: 150
    charts:
      - namespace_distribution   # Seiten pro Namespace
      - format_breakdown         # Dateiformate
      - quality_scores           # Qualitäts-Scores
      - rag_readiness_radar      # RAG-Readiness Radar

# =============================================================================
# PROCESSING - Ausführungseinstellungen
# =============================================================================
PROCESSING:
  # Performance
  batch_size: 50                 # Dateien pro Batch
  max_workers: 4                 # Parallele Worker

  # Error Handling
  continue_on_error: true
  max_errors: 100

  # Progress
  show_progress: true
  log_level: INFO

# =============================================================================
# LOGGING
# =============================================================================
LOGGING:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: ${results_dir}/evaluation.log
  console: true
  # Deep evaluation specific log file
  deep_eval_log: ${results_dir}/deep_evaluation.log
