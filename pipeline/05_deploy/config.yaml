# Dev Dito - Raspberry Pi Deployment Configuration
# ================================================

# SSH Connection Settings
ssh:
  host: raspi-docker
  user: imreo
  port: 22
  # key_path: ~/.ssh/id_rsa  # Uncomment if using key authentication

# Remote Paths on Raspberry Pi
remote:
  embeddings_dir: ~/mcp-diploma-thesis-final/data/incoming/
  qdrant_compose: ~/mcp-diploma-thesis-final/docker-compose.yml

# Local Paths (relative to this config file)
# Stage 04 writes to: <embeddings_dir>/embedded_at_YYYYMMDD_HHMMSS/embedded_chunks.jsonl
local:
  embeddings_dir: ../../data/embeddings

# Transfer Settings
transfer:
  verify_checksum: true
  backup_existing: true
  max_retries: 3
  timeout_seconds: 300

# Qdrant Settings on Pi
qdrant:
  host: localhost
  port: 6333
  collection_name: wiki_embeddings
