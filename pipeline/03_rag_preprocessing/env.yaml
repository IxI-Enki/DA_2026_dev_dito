# RAG Preprocessing Pipeline Configuration
# =========================================
# Transforms fetched Wiki content into RAG-optimized Markdown with YAML frontmatter.

APP:
  name: rag_preprocessing
  description: "Transforms Wiki content to Markdown with YAML frontmatter"
  version: 1.0.0
  author:
    full_name: Jan Ritt
    github: IxI-Enki

# =============================================================================
# PATHS
# =============================================================================
PATHS:
  # Base directory (dev_dito repository root)
  root_dir: AUTO   # resolved to the repository root at runtime
  
  # Input: Fetched wiki data
  fetched_dir: ${root_dir}/data/fetched
  
  # Input: Evaluation results from Stage 2
  evaluated_dir: ${root_dir}/data/evaluated
  
  # Output: Preprocessed data for Stage 4 (Embeddings)
  output_dir: ${root_dir}/data/preprocessed
  
  # Logs
  log_dir: ${root_dir}/data/logs

# =============================================================================
# WIKI CONVERSION SETTINGS
# =============================================================================
CONVERSION:
  # Wiki source URL for generating source links
  wiki_base_url: https://leowiki.htl-leonding.ac.at/doku.php?id=
  
  # Heading conversion (DokuWiki uses = signs)
  # ====== H1 ====== -> # H1
  # ===== H2 =====   -> ## H2
  # etc.
  preserve_heading_levels: true
  
  # Link handling
  links:
    # Convert internal wiki links to markdown
    convert_internal: true
    # Preserve external links as-is
    preserve_external: true
    # Include link target in title attribute
    include_targets: true
  
  # Table handling
  tables:
    # Convert DokuWiki tables (^ and |) to Markdown
    convert_to_markdown: true
    # Preserve alignment if possible
    preserve_alignment: true
  
  # Code blocks
  code_blocks:
    # Preserve language hints
    preserve_language: true
    # Convert <code> tags to fenced blocks
    use_fenced: true

# =============================================================================
# FRONTMATTER CONFIGURATION
# =============================================================================
FRONTMATTER:
  # Fields to include in YAML frontmatter
  fields:
    # Core identification
    - title
    - page_id
    - namespace
    - source
    
    # From Stage 2 Evaluation (if available)
    - content_type
    - quality_score
    - embedding_recommendation
    
    # Access control
    - access_level
    
    # Timestamps
    - created_at
    - modified_at
    - fetched_at
    - preprocessed_at
    
    # Relationships
    - links_to
    - linked_from
    - media_refs

# =============================================================================
# MEDIA PROCESSING
# =============================================================================
# Tesseract path (Article II-B): set in config/env.yaml or here.
# Windows default: C:/Program Files/Tesseract-OCR/tesseract.exe
MEDIA:
  tesseract_path: "C:/Program Files/Tesseract-OCR/tesseract.exe"
  # Extract text from these file types
  extract_text:
    pdf: true
    docx: true
    doc: false  # Requires additional tools
    xlsx: true
    pptx: true
    
  # OCR settings (requires pytesseract)
  ocr:
    enabled: false
    language: deu+eng
    
  # Skip files larger than (MB)
  max_file_size_mb: 50

# =============================================================================
# VISION-LLM (US6: Image Captioning via LMStudio)
# =============================================================================
# LMStudio: For large images, set context size (n_ctx) to at least 8192 to avoid
# "failed to process image" / "exceeds the available context size" errors.
VISION_LLM:
  # LMStudio OpenAI-compatible API endpoint (glass.ps1 uses 127.0.0.1:1234)
  api_base: http://127.0.0.1:1234/v1
  # Catalog key / OpenAI model id (must match lms load / glass $_lmsModel)
  model: qwen/qwen2.5-vl-7b
  # Optional Bearer token; prefer env LM_API_TOKEN or LMS_API_TOKEN (do not use "not-needed")
  api_key: ""
  # Request timeout in seconds
  timeout: 60
  # Max longest edge (px) before downscaling; reduces token usage and context overflow
  max_image_size: 1024

# =============================================================================
# OUTPUT SETTINGS
# =============================================================================
OUTPUT:
  # Directory naming
  timestamp_format: "%Y%m%d_%H%M%S"
  prefix: preprocess_at_
  
  # File structure
  pages_subdir: pages
  media_subdir: media
  
  # Manifest
  manifest_file: manifest.json
  
  # Encoding
  encoding: utf-8

# =============================================================================
# PROCESSING
# =============================================================================
PROCESSING:
  # Continue on individual file errors
  continue_on_error: true
  
  # Maximum errors before abort
  max_errors: 50
  
  # Skip empty files
  skip_empty: true
  
  # Minimum content length (characters)
  min_content_length: 10

# =============================================================================
# LOGGING
# =============================================================================
LOGGING:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: ${log_dir}/preprocessing.log
  console: true
