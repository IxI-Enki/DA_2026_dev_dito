# RAG Preprocessing Pipeline - Configuration Template
# ====================================================
# Copy to env.yaml and adjust. env.yaml is gitignored (Article II-B).
# Config loader prefers config/env.yaml over module-root env.yaml.

PATHS:
  root_dir: .  # Override with repo root
  fetched_dir: ${root_dir}/data/fetched
  evaluated_dir: ${root_dir}/data/evaluated
  output_dir: ${root_dir}/data/preprocessed
  log_dir: ${root_dir}/data/logs

CONVERSION:
  wiki_base_url: ""

FRONTMATTER:
  fields: []

# MEDIA: OCR and Tesseract (Article II-B: no hardcoded paths)
MEDIA:
  tesseract_path: "C:/Program Files/Tesseract-OCR/tesseract.exe"  # Windows; Linux: /usr/bin/tesseract
  extract_text:
    pdf: true
    docx: true
  ocr:
    enabled: true
    language: deu+eng
  max_file_size_mb: 50

OUTPUT: {}
PROCESSING: {}
