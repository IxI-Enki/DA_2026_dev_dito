# =============================================================================
# Dev Dito Backend Services - Stack-G
# =============================================================================
# Part of the HTL Wiki multi-stack ecosystem
# Integrates with: stack-d-ai-core (Qdrant), stack-h-mcp (Semantic Search)
#
# Usage:
#   docker compose -p stack-g-devdito up -d                    # Start orchestrator
#   docker compose -p stack-g-devdito --profile pipeline run   # Run pipeline modules
#   docker compose -p stack-g-devdito down                     # Stop all
#
# Network: htl-wiki-network (external, shared with other stacks)
# =============================================================================

name: stack-g-devdito

services:
  # ==========================================================================
  # Orchestrator API
  # Manages pipeline execution and provides status API for DokuWiki plugin
  # ==========================================================================
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: dev-dito-orchestrator
    restart: unless-stopped
    ports:
      - "8089:8089"
    volumes:
      - ../config:/config:ro
      - ../data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONFIG_PATH=/config/env.yaml
      - DATA_PATH=/data
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - leonidas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Pipeline Module: Wiki Fetcher
  # Fetches content from DokuWiki via JSON-RPC API
  # ==========================================================================
  module_fetcher:
    build:
      context: ./module_fetcher
      dockerfile: Dockerfile
    container_name: dev-dito-module-fetcher
    profiles: ["pipeline"]
    volumes:
      - ../config:/config:ro
      - ../data:/data
      - ../pipeline/01_wiki_fetcher:/pipeline/01_wiki_fetcher:ro
      - ../config.py:/app/config.py:ro
    environment:
      - CONFIG_PATH=/config/env.yaml
      - DATA_PATH=/data
      - PIPELINE_PATH=/pipeline/01_wiki_fetcher
      - OUTPUT_DIR=/data/fetched
      - TOKEN_PATH=/config/secrets/json_rpc_api.token
      - SSL_CERT_PATH=/config/secrets/ssl.cert
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
    networks:
      - leonidas-network

  # ==========================================================================
  # Pipeline Module: Content Evaluator
  # Evaluates fetched wiki content quality
  # ==========================================================================
  module_evaluator:
    build:
      context: ./module_evaluator
      dockerfile: Dockerfile
    container_name: dev-dito-module-evaluator
    profiles: ["pipeline"]
    volumes:
      - ../config:/config:ro
      - ../data:/data
      - ../pipeline/02_deep_evaluation:/pipeline/02_deep_evaluation:ro
    environment:
      - CONFIG_PATH=/config/env.yaml
      - DATA_PATH=/data
      - PIPELINE_PATH=/pipeline/02_deep_evaluation
    networks:
      - leonidas-network

  # ==========================================================================
  # Pipeline Module: RAG Preprocessor
  # Converts Wiki syntax to RAG-optimized Markdown with YAML frontmatter
  # ==========================================================================
  module_preprocessor:
    build:
      context: ./module_preprocessor
      dockerfile: Dockerfile
    container_name: dev-dito-module-preprocessor
    profiles: ["pipeline"]
    volumes:
      - ../config:/config:ro
      - ../data:/data
      - ../pipeline/03_rag_preprocessing:/pipeline/03_rag_preprocessing:ro
    environment:
      - CONFIG_PATH=/config/env.yaml
      - DATA_PATH=/data
      - PIPELINE_PATH=/pipeline/03_rag_preprocessing
    networks:
      - leonidas-network

  # ==========================================================================
  # Pipeline Module: Embeddings Creator
  # Creates vector embeddings using OpenAI API
  # ==========================================================================
  module_embedder:
    build:
      context: ./module_embedder
      dockerfile: Dockerfile
    container_name: dev-dito-module-embedder
    profiles: ["pipeline"]
    volumes:
      - ../config:/config:ro
      - ../data:/data
      - ../pipeline/03_embeddings_creator:/pipeline/03_embeddings_creator:ro
    environment:
      - CONFIG_PATH=/config/env.yaml
      - DATA_PATH=/data
      - PIPELINE_PATH=/pipeline/03_embeddings_creator
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - leonidas-network

  # ==========================================================================
  # Pipeline Module: Qdrant Deployer
  # Uploads embeddings to Qdrant vector database (stack-d-ai-core)
  # ==========================================================================
  module_deployer:
    build:
      context: ./module_deployer
      dockerfile: Dockerfile
    container_name: dev-dito-module-deployer
    profiles: ["pipeline"]
    volumes:
      - ../config:/config:ro
      - ../data:/data
    environment:
      - CONFIG_PATH=/config/env.yaml
      - DATA_PATH=/data
      # Connect to Qdrant in stack-d-ai-core via shared network
      - QDRANT_HOST=qdrant-main-vector-db
      - QDRANT_PORT=6333
      - COLLECTION_NAME=wiki_embeddings
    networks:
      - leonidas-network

# =============================================================================
# Networks
# =============================================================================
# External network shared with other HTL Wiki stacks:
# - stack-a-wiki-sandbox
# - stack-b-wiki-core (Keycloak)
# - stack-d-ai-core (Qdrant)
# - stack-h-mcp (Semantic Search)
# =============================================================================
networks:
  leonidas-network:
    external: true
    name: leonidas-network
