# Dev Dito Backend Services - Standalone Docker Compose
# =====================================================
# Startet alle Backend-Services fuer Dev Dito unabhaengig von DokuWiki
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d qdrant_db    # Start only Qdrant
#   docker-compose logs -f            # View logs
#   docker-compose down               # Stop all services
#
# Environment Variables:
#   OPENAI_API_KEY: Required for MCP Server embeddings

version: '3.8'

services:
  # ==========================================================================
  # Qdrant Vector Database
  # ==========================================================================
  qdrant_db:
    image: qdrant/qdrant:v1.13.2
    container_name: devdito_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Qdrant Initialization Container
  # Imports embeddings from JSONL file into Qdrant collection
  # ==========================================================================
  qdrant_init:
    build:
      context: ./qdrant_db
      dockerfile: Dockerfile
    container_name: devdito_qdrant_init
    depends_on:
      qdrant_db:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant_db
      - QDRANT_PORT=6333
      - COLLECTION_NAME=wiki_embeddings
      - EMBEDDINGS_FILE=/data/embeddings/embedded_chunks.jsonl
    volumes:
      - ../data/embeddings:/data/embeddings:ro
    restart: "no"

  # ==========================================================================
  # Wiki MCP Server (Model Context Protocol)
  # Provides semantic search tools for Leonidas
  # ==========================================================================
  wiki_mcp_server:
    build:
      context: ./wiki_dev_mcp_server
      dockerfile: Dockerfile
    container_name: devdito_mcp_server
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      qdrant_db:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant_db
      - QDRANT_PORT=6333
      - COLLECTION_NAME=wiki_embeddings
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MCP_SERVER_PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Pipeline Module: Wiki Fetcher
  # ==========================================================================
  # Usage: docker compose --profile pipeline run --rm module_fetcher <job_id>
  module_fetcher:
    build:
      context: ./module_fetcher
      dockerfile: Dockerfile
    container_name: dev-dito-module-fetcher
    profiles: ["pipeline"]
    volumes:
      - ../config:/config:ro
      - ../data:/data
      - ../pipeline/01_wiki_fetcher:/pipeline/01_wiki_fetcher:ro
      # Root config.py for central configuration
      - ../config.py:/app/config.py:ro
    environment:
      - CONFIG_PATH=/config/env.yaml
      - DATA_PATH=/data
      - PIPELINE_PATH=/pipeline/01_wiki_fetcher
      # Override Windows paths for container
      - OUTPUT_DIR=/data/fetched
      - TOKEN_PATH=/config/secrets/json_rpc_api.token
      - SSL_CERT_PATH=/config/secrets/ssl.cert
      # SSL certificate trust for Python requests
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
    networks:
      - devdito_network

