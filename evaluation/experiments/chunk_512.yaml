experiment:
  name: "Chunk Size 512 Tokens"
  type: chunk_size
  thesis_id: "J4"

embedding:
  provider: ollama
  model: "bge-m3"
  dimensions: 1024

chunking:
  strategy: content_aware
  chunk_size: 512
  chunk_overlap: 50

retrieval:
  mode: dense
  top_k: 10
  collection_prefix: "eval_chunk_"

ground_truth:
  file: "ground_truth/leowiki_qa_50_verified.json"

metrics:
  - mrr
  - precision_at_5
  - ndcg_at_10
