experiment:
  name: "bge-m3-unsupervised (MTEB #12, 60.24) — RAGFlow baseline"
  type: model_comparison
  thesis_id: "J2/FF3"

embedding:
  provider: sentence-transformers
  model: "BAAI/bge-m3-unsupervised"
  dimensions: 1024

chunking:
  strategy: content_aware
  chunk_size: 512
  chunk_overlap: 50

retrieval:
  mode: dense
  top_k: 10
  collection_name: "eval_bge_m3_unsupervised"

qdrant:
  host: "localhost"
  port: 6334

ground_truth:
  file: "ground_truth/test_corpus_qa.json"

metrics:
  - mrr
  - precision_at_5
  - ndcg_at_10
  - recall_at_10
  - hit_rate
