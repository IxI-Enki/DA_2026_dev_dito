# J4 — Chunk Size 256 Tokens
# Uses OpenAI text-embedding-3-large (best speed/quality trade-off).
# Ground truth: 78 Q&A pairs (same as FF3 model comparison).

experiment:
  name: "Chunk Size 256 — text-embedding-3-large"
  type: chunk_size
  thesis_id: "J4"

embedding:
  provider: openai
  model: "text-embedding-3-large"
  dimensions: 3072

chunking:
  chunk_size: 256
  chunk_overlap: 50

retrieval:
  mode: dense
  top_k: 10
  collection_prefix: "eval_chunk_"

ground_truth:
  file: "ground_truth/leowiki_qa_78_Opus_46.json"

metrics:
  - mrr
  - precision_at_5
  - ndcg_at_10
