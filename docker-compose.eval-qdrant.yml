version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: eval_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - eval_qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

volumes:
  eval_qdrant_data:
