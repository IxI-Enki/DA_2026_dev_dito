# Dev Dito - Development Konfiguration
# =====================================
# Vollstaendige Konfiguration fuer lokale Entwicklung und Tests.
# Verwendet die laufenden Docker-Container aus Docker Desktop.

# =============================================================================
# APP - Projekt-Metadaten
# =============================================================================
APP:
  name: dev_dito
  version: "0.2.0"
  description: "Wiki Embedding Pipeline & Service Gateway"
  status: development

# =============================================================================
# PATHS - Zentrale Pfade
# =============================================================================
PATHS:
  root_dir: D:/_Repositories/_Diploma_Thesis_Repositories/dev_dito
  config_dir: ${root_dir}/config
  secrets_dir: ${config_dir}/secrets
  data_dir: ${root_dir}/data
  pipeline_dir: ${root_dir}/pipeline

# =============================================================================
# SOURCE_WIKI - LeoWiki JSON-RPC API
# =============================================================================
SOURCE_WIKI:
  name: "HTL Leonding LeoWiki"
  api:
    url: https://leowiki.htl-leonding.ac.at/lib/exe/jsonrpc.php
    base_url: https://leowiki.htl-leonding.ac.at
    fetch_url: https://leowiki.htl-leonding.ac.at/lib/exe/fetch.php
  authentication:
    type: bearer
    token_file: ${secrets_dir}/json_rpc_api.token
  certificate: ${secrets_dir}/ssl.cert

# =============================================================================
# SERVICES - Docker Container (siehe Docker Desktop Screenshot)
# =============================================================================
SERVICES:
  # Qdrant Vector DB (stack-d-ai-core -> qdrant-main-vector-db)
  qdrant:
    host: localhost          # localhost fuer Zugriff von ausserhalb Docker
    port: 6333               # Port 6333:6333
    collection: wiki_embeddings

  # MCP Server (stack-h-mcp -> semantic-search-wiki-core)
  mcp_server:
    url: http://localhost:3000
    timeout: 30

  # OpenAI API (fuer Embeddings)
  openai:
    token_file: ${secrets_dir}/openai.token
    embedding_model: text-embedding-3-large
    dimensions: 3072

# =============================================================================
# PIPELINE - Fetcher, Evaluator, Embedder, Deploy
# =============================================================================
PIPELINE:
  fetcher:
    timeout: 30
    max_retries: 3
    delay_between_requests: 0.1
    max_namespace_depth: 5
    content:
      fetch_html: true
      fetch_links: true
      fetch_backlinks: true
    media:
      enabled: true
      max_file_size_mb: 50
    filter:
      exclude_namespaces:
        - playground
        - wiki
    output:
      directory_pattern: "fetched_at_{timestamp}"
      generate_report: true

  evaluator:
    llm_provider: openai
    model: gpt-4o-mini

  embedder:
    chunk_size: 512
    chunk_overlap: 50
    batch_size: 100

  deploy:
    collection_name: wiki_embeddings
    recreate_collection: false

# =============================================================================
# PIPELINE_ORCHESTRATION - Docker Module
# =============================================================================
PIPELINE_ORCHESTRATION:
  docker:
    compose_path: ${root_dir}/backend_services
    network: devdito_network
  stages:
    fetch:
      container: dev-dito-module-fetcher
      timeout_seconds: 3600
    evaluate:
      container: dev-dito-module-evaluator
      timeout_seconds: 7200
    embed:
      container: dev-dito-module-embedder
      timeout_seconds: 3600
    deploy:
      container: dev-dito-module-deployer
      timeout_seconds: 1800
  logging:
    status_file: ${data_dir}/logs/pipeline_runs.json
    poll_interval_seconds: 5

# =============================================================================
# TESTING - Defaults fuer Tests
# =============================================================================
TESTING:
  default_page: "teacher:start"
  default_namespace: "teacher"
