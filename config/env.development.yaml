# Dev Dito - Development Konfiguration (VOLLSTAENDIG)
# ====================================================
# Exakt wie das originale Fetcher-Setup aus research/techstack
# Fuer lokale Entwicklung und Tests - funktioniert sofort!
#
# VERWENDUNG:
#   1. Kopiere diese Datei nach env.yaml
#   2. Fuehre 'python config.py' aus
#   3. Starte das Plugin

# =============================================================================
# APP - Projekt-Metadaten
# =============================================================================
APP:
  name: dev_dito
  description: "Wiki Embedding Pipeline & Service Gateway fuer DokuWiki"
  version: "0.2.0"
  status: development
  created_at: "2026-01-31"
  last_modified: "2026-01-31"
  author:
    full_name: Jan Ritt
    github_profile:
      username: IxI-Enki
      url: https://github.com/IxI-Enki

# =============================================================================
# PATHS - Alle Pfade zentral (Forward Slashes auch auf Windows!)
# =============================================================================
PATHS:
  root_dir: AUTO   # leave as AUTO; resolved to the repo root at runtime
  config_dir: ${root_dir}/config
  secrets_dir: ${config_dir}/secrets
  output_dir: ${root_dir}/data/fetched
  data_dir: ${root_dir}/data
  pipeline_dir: ${root_dir}/pipeline

# =============================================================================
# SOURCE_WIKI - JSON-RPC API zum Quell-Wiki (LeoWiki)
# Exakt wie im originalen fetcher_json_rpc_api
# =============================================================================
SOURCE_WIKI:
  name: "HTL Leonding LeoWiki"
  api:
    url: https://leowiki.htl-leonding.ac.at/lib/exe/jsonrpc.php
    base_url: https://leowiki.htl-leonding.ac.at
    fetch_url: https://leowiki.htl-leonding.ac.at/lib/exe/fetch.php
    feed_url: https://leowiki.htl-leonding.ac.at/feed.php
  authentication:
    type: bearer
    token_file: ${secrets_dir}/json_rpc_api.token
  certificate: ${secrets_dir}/ssl.cert

# =============================================================================
# SERVICES - Externe Service-Verbindungen
# localhost fuer Zugriff von ausserhalb Docker (PHP, Browser)
# =============================================================================
SERVICES:
  mcp_server:
    url: http://localhost:3000
    timeout: 30
  
  qdrant:
    host: localhost
    port: 6333
    collection: wiki_embeddings
  
  openai:
    token_file: ${secrets_dir}/openai.token
    embedding_model: text-embedding-3-large
    dimensions: 3072

# =============================================================================
# PIPELINE - Fetcher, Evaluator, Embedder, Deploy
# EXAKT wie das Original aus research/techstack/dokuwiki/fetcher_json_rpc_api
# =============================================================================
PIPELINE:
  # -------------------------------------------------------------------------
  # 01_wiki_fetcher - Holt Wiki-Inhalte via JSON-RPC
  # IDENTISCH mit dem Original!
  # -------------------------------------------------------------------------
  fetcher:
    # === PERFORMANCE ===
    timeout: 2                     # Request timeout in Sekunden
    max_retries: 3                 # Wiederholungsversuche bei Fehlern
    retry_delay: 2                 # Wartezeit zwischen Retries (Sekunden)
    delay_between_requests: 0.05   # Pause zwischen Requests (server-freundlich)
    batch_progress_interval: 2     # Fortschrittsanzeige alle N Items

    # === NAMESPACE SCANNING ===
    max_namespace_depth: 5         # Maximale Tiefe fuer Sub-Namespaces (1-10)
    scan_all_sub_namespaces: true  # Alle Sub-Namespaces scannen
    use_recursive_listing: true    # wiki.getPagelist mit depth=0 verwenden
    use_search_discovery: true     # Search API fuer versteckte Seiten

    # === CONTENT SELECTION ===
    content:
      fetch_html: true             # HTML-Version der Seiten
      fetch_acl: true              # Zugriffsrechte pro Seite
      fetch_links: true            # Links aus HTML extrahieren
      fetch_history: true          # Revisionshistorie pro Seite
      fetch_backlinks: true        # Eingehende Links pro Seite
      fetch_recent_changes: true   # Wiki-weite aktuelle Aenderungen

    # === MEDIA OPTIONS ===
    media:
      enabled: true                # Media-Download aktivieren
      max_file_size_mb: 0          # Max. Dateigroesse (0 = unbegrenzt)
      from_listings: true          # Media aus core.listMedia
      from_page_links: true        # Auch referenzierte Media aus Links
      include_types: []            # Nur diese Typen (leer = alle)
      exclude_types: []            # Diese Typen ausschliessen

    # === FILTERING ===
    filter:
      include_namespaces: []       # Nur diese Namespaces (leer = alle)
      exclude_namespaces: []       # Diese Namespaces ueberspringen
      exclude_pages: []            # Einzelne Seiten ausschliessen

    # === OUTPUT ===
    output:
      directory_pattern: "fetched_at_{timestamp}"
      save_raw_responses: true     # Rohe API-Responses speichern
      generate_report: true        # Analyse-Report erstellen
      report_format: "txt"         # Report-Format: txt, json, md
      recent_changes_count: 30     # Anzahl der neuesten Aenderungen im Report
      deepest_pages_count: 20      # Anzahl der tiefsten Pfade im Report

    # === QUALITY ===
    quality:
      validate_internal_links: true   # Interne Links validieren
      report_broken_links: true       # Broken Links im Report
      verify_media_integrity: false   # Media-Downloads verifizieren (langsam)

    # === CACHE (Fast-Mode) ===
    cache:
      enabled: true                    # Fast-Mode: Media aus Archiv kopieren
      archive_dirs:                    # Archiv-Ordner zum Scannen
        - "archived_fetch_tests"
      hash_algorithm: "sha256"         # Hash-Algorithmus
      verify_on_copy: true             # Hash nach Kopieren verifizieren

  # -------------------------------------------------------------------------
  # 02_deep_evaluation
  # -------------------------------------------------------------------------
  evaluator:
    llm_provider: openai
    model: gpt-4o-mini
    temperature: 0.1
    max_tokens: 4000

  # -------------------------------------------------------------------------
  # 04_embeddings_creator
  # -------------------------------------------------------------------------
  embedder:
    chunk_size: 512
    chunk_overlap: 50
    batch_size: 100
    embedding_model: text-embedding-3-large
    dimensions: 3072

  # -------------------------------------------------------------------------
  # 05_deploy
  # -------------------------------------------------------------------------
  deploy:
    target: qdrant
    collection_name: wiki_embeddings
    upsert_batch_size: 100
    recreate_collection: false

# =============================================================================
# PIPELINE_ORCHESTRATION - Docker Module
# =============================================================================
PIPELINE_ORCHESTRATION:
  # HTTP Orchestrator API (laeuft auf Host, nicht in Container)
  # WICHTIG: host.docker.internal fuer Zugriff vom Docker-Container auf Host
  orchestrator:
    url: http://host.docker.internal:18089
    timeout: 30
  
  docker:
    compose_path: ${root_dir}/backend_services
    network: devdito_network
  
  stages:
    fetch:
      container: dev-dito-module-fetcher
      timeout_seconds: 3600
      description: "Fetcht Wiki-Inhalte via JSON-RPC API"
    evaluate:
      container: dev-dito-module-evaluator
      timeout_seconds: 7200
      description: "LLM-gestuetzte Inhaltsanalyse"
    embed:
      container: dev-dito-module-embedder
      timeout_seconds: 3600
      description: "Generiert Embeddings via OpenAI/lokales Model"
    deploy:
      container: dev-dito-module-deployer
      timeout_seconds: 1800
      description: "Laedt Embeddings in Qdrant hoch"
  
  logging:
    status_file: ${data_dir}/logs/pipeline_runs.json
    max_log_entries: 100
    poll_interval_seconds: 5

# =============================================================================
# PLUGIN - DokuWiki Plugin
# =============================================================================
PLUGIN:
  enabled: true

# =============================================================================
# TESTING - Defaults fuer Tests
# =============================================================================
TESTING:
  default_page: "teacher:start"
  default_namespace: "teacher"
  default_media: "wiki:logo.png"
