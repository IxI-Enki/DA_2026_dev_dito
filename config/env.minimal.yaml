# Dev Dito - Minimale Konfiguration
# ==================================
# Nur die notwendigsten Einstellungen.
# Fuer vollstaendige Optionen siehe PLACEHOLDER_env.yaml

APP:
  name: dev_dito
  version: "0.2.0"

PATHS:
  root_dir: AUTO   # leave as AUTO; resolved to the repo root at runtime

SOURCE_WIKI:
  api:
    url: https://leowiki.htl-leonding.ac.at/lib/exe/jsonrpc.php
    base_url: https://leowiki.htl-leonding.ac.at
  authentication:
    type: bearer
    token_file: ${root_dir}/config/secrets/json_rpc_api.token
  certificate: ${root_dir}/config/secrets/ssl.cert

SERVICES:
  qdrant:
    host: localhost
    port: 6333
    collection: wiki_embeddings
